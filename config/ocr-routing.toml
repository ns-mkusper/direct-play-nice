# Data-driven OCR recognition routing.
#
# `language_profiles` forces a profile for specific language tags/codes.
# `script_profiles` maps BCP-47 script subtags to a profile.
# `likely_scripts` fills script when subtitles only provide language codes.

default_profile = "latin"

[language_profiles]
eng = "english"
en = "english"
jpn = "japanese"
ja = "japanese"
