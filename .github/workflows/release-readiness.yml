name: Release Readiness

on:
  pull_request:
    branches:
      - main

jobs:
  will-release:
    name: Will Trigger Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release-relevant changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          printf '%s\n' "$changed"

          enforce=false

          if printf '%s\n' "$changed" | grep -Eq '^(src/|Cargo\.lock$|release-plz\.toml$|cliff\.toml$|CHANGELOG\.md$)'; then
            enforce=true
          fi

          if [[ "$enforce" != "true" ]] && printf '%s\n' "$changed" | grep -Eq '^Cargo\.toml$'; then
            # Treat Cargo.toml edits as release-impacting only when they touch
            # package versioning/build surface (not benches/docs-only metadata).
            if git diff --unified=0 "origin/${{ github.base_ref }}...HEAD" -- Cargo.toml | \
              grep -Eq '^[+-]\s*(version|publish)\s*=|^[+-]\s*\[(dependencies|dev-dependencies|build-dependencies|target\..*\.dependencies|features|workspace\.dependencies)\]'; then
              enforce=true
            fi
          fi

          if [[ "$enforce" == "true" ]]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
            echo "Release-readiness enforcement enabled."
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
            echo "Release-readiness enforcement skipped: no crate/release metadata changes."
          fi

      - name: Run release-plz update preview
        if: steps.changes.outputs.enforce == 'true'
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: update
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate matching changelog release notes
        if: steps.changes.outputs.enforce == 'true'
        shell: bash
        run: bash scripts/validate_release_changelog.sh

      - name: Decide if merge will release
        if: steps.changes.outputs.enforce == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! git diff --quiet -- Cargo.toml Cargo.lock CHANGELOG.md; then
            echo "release-plz would update release metadata on merge."
            git --no-pager diff --name-status -- Cargo.toml Cargo.lock CHANGELOG.md
            exit 0
          fi

          crate_name="$(awk -F'"' '/^name = / { print $2; exit }' Cargo.toml)"
          crate_version="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"

          if [[ -z "$crate_name" || -z "$crate_version" ]]; then
            echo "::error title=Release check failed::Unable to parse crate name/version from Cargo.toml"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/v${crate_version}" >/dev/null; then
            echo "::warning title=No release detected::Tag v${crate_version} already exists, and release-plz has no metadata updates to apply."
            exit 0
          fi

          status="$(curl -s -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/${crate_name}/${crate_version}")"
          if [[ "$status" == "200" ]]; then
            echo "::warning title=No release detected::${crate_name} ${crate_version} is already published on crates.io, and release-plz has no metadata updates to apply."
            exit 0
          fi
          if [[ "$status" != "404" ]]; then
            echo "::warning title=Crates.io check inconclusive::Received HTTP ${status} from crates.io API."
          fi

          echo "Current crate version ${crate_version} is not tagged/published, so merge should trigger a release."

      - name: Release readiness skipped
        if: steps.changes.outputs.enforce != 'true'
        run: echo "No release-impacting changes in this PR; skipping strict release-trigger check."
