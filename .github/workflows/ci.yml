name: CI

on:
  pull_request:
    branches:
      - "**"
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'media/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '.editorconfig'
      - '.gitignore'
      - '.gitattributes'
      - '.prettier*'
      - '.vscode/**'
      - '.idea/**'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body, '[skip ci]') }}
    name: Test (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt

      - name: Set up sccache
        id: sccache-setup
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get --assume-yes install nasm ffmpeg

      - name: Set job-level RUSTC_WRAPPER
        if: steps.sccache-setup.outcome == 'success'
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - if: steps.sccache-setup.outcome == 'failure'
        run: echo "RUSTC_WRAPPER=" >> $GITHUB_ENV

      - name: Cache cargo-vcpkg binary
        id: cargo-vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-vcpkg
          key: cargo-vcpkg-linux-v1

      - name: Install cargo-vcpkg
        if: steps.cargo-vcpkg-cache.outputs.cache-hit != 'true'
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
        run: cargo install cargo-vcpkg --locked

      - name: Resolve rusty_ffmpeg prebuilt bindings
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch
          CARGO_HOME_DIR="${CARGO_HOME:-$HOME/.cargo}"
          BINDING_PATH=$(find "$CARGO_HOME_DIR/registry/src" -type f -path "*/rusty_ffmpeg-0.16.7*/src/binding.rs" | head -n1)
          if [ -z "$BINDING_PATH" ]; then
            echo "Failed to resolve rusty_ffmpeg prebuilt binding.rs"
            exit 1
          fi
          echo "FFMPEG_BINDING_PATH=$BINDING_PATH" >> "$GITHUB_ENV"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-vcpkg-v3-ffmpeg8

      - name: Build vcpkg dependencies
        env:
          VCPKG_FEATURE_FLAGS: manifests,binarycaching
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
          VCPKG_CMAKE_CONFIGURE_OPTIONS: -Wno-dev -DCMAKE_POLICY_DEFAULT_CMP0174=NEW
          VCPKG_MAX_CONCURRENCY: 2
          CMAKE_BUILD_PARALLEL_LEVEL: 2
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
        run: cargo vcpkg --verbose build

      - name: Upload vcpkg logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs
          path: |
            target/vcpkg/buildtrees/**/*.log
            target/vcpkg/buildtrees/**/*.txt
          retention-days: 7

      - name: Run tests
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
        run: cargo test -q

      - name: sccache stats
        if: ${{ env.RUSTC_WRAPPER == 'sccache' }}
        run: sccache --show-stats || true

  windows-test:
    name: Test (Windows MSVC)
    # Temporarily disabled: vcpkg/libiconv download is flaky and very slow
    # on CI, causing frequent failures. Re-enable when we remove cargo-vcpkg
    # for Windows or switch to prebuilt FFmpeg.
    if: ${{ false }}
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      VCPKGRS_TRIPLET: x64-windows-static
    steps:
      - uses: actions/checkout@v3
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Set up sccache
        id: sccache-setup
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Test sccache and set wrapper
        id: sccache-check
        shell: pwsh
        env:
          RUSTC_WRAPPER: sccache
        run: |
          try {
            cargo install cargo-vcpkg
            echo "RUSTC_WRAPPER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } catch {
            echo "RUSTC_WRAPPER=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            throw "sccache failed, proceeding without it."
          }
        continue-on-error: true
      
      - name: Install ffmpeg CLI (for e2e test)
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Build vcpkg dependencies (with binary cache + sccache)
        shell: pwsh
        env:
          VCPKG_FEATURE_FLAGS: manifests,binarycaching
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
          VCPKG_CMAKE_CONFIGURE_OPTIONS: -Wno-dev -DCMAKE_POLICY_DEFAULT_CMP0174=NEW
          VCPKG_MAX_CONCURRENCY: 2
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
        run: cargo vcpkg --verbose build

      - name: Compile tests (no run)
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
        run: cargo test --no-run --verbose

      - name: Run tests
        run: cargo test -q

      - name: sccache stats
        if: ${{ env.RUSTC_WRAPPER == 'sccache' }}
        run: sccache --show-stats || true
